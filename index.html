<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Remacle — Carte Terrain</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f0;--sidebar:#fff;--border:#e8e4dc;
  --text:#1a1916;--muted:#7a776f;--accent:#d4440f;--green:#1a6b3c;
  --pill:#f0ede6;--shadow:0 2px 12px rgba(0,0,0,.08);
}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)}
#app{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
#sidebar{width:320px;min-width:320px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;box-shadow:2px 0 12px rgba(0,0,0,.04);z-index:1000}
#sidebar-header{padding:16px 18px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.logo-mark{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:13px;flex-shrink:0}
.logo-text{font-size:14px;font-weight:600;letter-spacing:-.3px}
.logo-sub{font-size:11px;color:var(--muted)}
.stats-row{display:flex;gap:7px}
.stat-chip{flex:1;background:var(--pill);border-radius:8px;padding:7px 8px;text-align:center}
.stat-chip .n{font-size:17px;font-weight:700;line-height:1;font-family:'DM Mono',monospace}
.stat-chip .l{font-size:10px;color:var(--muted);margin-top:2px;font-weight:500;text-transform:uppercase;letter-spacing:.3px}

.search-area{padding:12px 18px;border-bottom:1px solid var(--border);flex-shrink:0}
.sw{position:relative;margin-bottom:7px}.sw:last-child{margin-bottom:0}
.sb{width:100%;padding:8px 12px 8px 32px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;background:var(--pill);outline:none;color:var(--text);transition:border-color .15s,background .15s}
.sb:focus{border-color:#bbb;background:#fff}
.si{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;font-size:13px}

.filters-area{padding:0 18px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.fr{display:flex;gap:7px;margin-bottom:7px}
.fs{flex:1;padding:7px 8px;border:1px solid var(--border);border-radius:8px;font-size:12px;font-family:inherit;background:var(--pill);color:var(--text);outline:none;cursor:pointer}
.tr{display:flex;align-items:center;gap:8px;padding:3px 0;margin-bottom:3px}
.tl{font-size:12px;color:var(--muted);font-weight:500;cursor:pointer;user-select:none}
.tg{width:34px;height:19px;background:#d4d0c8;border-radius:10px;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.tg.on{background:var(--green)}
.tg::after{content:'';position:absolute;width:15px;height:15px;background:white;border-radius:50%;top:2px;left:2px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tg.on::after{transform:translateX(15px)}

#pdv-list{flex:1;overflow-y:auto;padding:6px 10px}
#pdv-list::-webkit-scrollbar{width:4px}
#pdv-list::-webkit-scrollbar-thumb{background:#d4d0c8;border-radius:2px}
.pdv-item{padding:9px 10px;border-radius:8px;cursor:pointer;margin-bottom:2px;transition:background .12s;border:1px solid transparent}
.pdv-item:hover{background:var(--pill);border-color:var(--border)}
.pdv-item.active{background:#fff8f5;border-color:#f5c4b0}
.pdv-name{font-size:13px;font-weight:600;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pdv-tags{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.badge-grp{display:inline-flex;height:17px;padding:0 6px;border-radius:4px;font-size:10px;font-weight:700;color:white;align-items:center;white-space:nowrap}
.badge-ens{display:inline-flex;height:17px;padding:0 6px;border-radius:4px;font-size:10px;font-weight:600;align-items:center;white-space:nowrap;border:1px solid}
.badge-ct{display:inline-flex;align-items:center;gap:2px;background:#e8f5ed;color:#1a6b3c;height:16px;padding:0 5px;border-radius:4px;font-size:10px;font-weight:600}
.pdv-loc{font-size:11px;color:var(--muted)}
.list-empty{text-align:center;color:var(--muted);font-size:13px;padding:40px 20px}

#map-container{flex:1;position:relative}
#map{width:100%;height:100%}

/* POPUP */
.rp .leaflet-popup-content-wrapper{border-radius:12px;padding:0;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.15);border:1px solid var(--border);font-family:'DM Sans',sans-serif}
.rp .leaflet-popup-content{margin:0;width:320px!important}
.rp .leaflet-popup-tip-container{margin-top:-1px}
.ph{padding:12px 14px 10px;border-bottom:1px solid var(--border)}
.ph-badges{display:flex;gap:5px;align-items:center;margin-bottom:5px;flex-wrap:wrap}
.ph-grp{display:inline-flex;height:19px;padding:0 8px;border-radius:5px;font-size:10px;font-weight:700;color:white;align-items:center;text-transform:uppercase;letter-spacing:.3px}
.ph-ens{display:inline-flex;height:19px;padding:0 8px;border-radius:5px;font-size:10px;font-weight:600;align-items:center;border:1.5px solid;background:white}
.ph-name{font-size:15px;font-weight:700;line-height:1.2;margin-bottom:2px}
.ph-loc{font-size:12px;color:var(--muted)}
.pc{padding:10px 14px}
.pc-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px}
.cc{padding:7px 0;border-bottom:1px solid var(--border)}
.cc:last-child{border-bottom:none;padding-bottom:0}
.cc-name{font-size:13px;font-weight:600}
.cc-role{font-size:11px;color:var(--muted);margin-bottom:3px;font-style:italic}
.ca{display:flex;gap:5px;flex-wrap:wrap}
.cb{display:inline-flex;align-items:center;gap:3px;padding:3px 7px;border-radius:5px;font-size:11px;font-weight:500;text-decoration:none;color:white;transition:opacity .15s}
.cb:hover{opacity:.85}
.cb.em{background:#3b5bdb}.cb.tl{background:var(--green)}
.pnc{padding:10px 14px 12px;font-size:12px;color:var(--muted);font-style:italic}
.pt{border-top:1px solid var(--border);padding:10px 14px 12px}
.pt-header{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.pt-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;flex:1}
.pt-badge{background:#fed7aa;color:#9a3412;border-radius:4px;padding:1px 6px;font-size:10px;font-weight:700}
.pt-radius{font-size:11px;border:1px solid var(--border);border-radius:5px;padding:2px 4px;background:var(--pill);font-family:inherit;cursor:pointer;outline:none}
.tc-row{display:flex;gap:6px;align-items:baseline;padding:3px 0;border-bottom:1px solid #f5f4f0}
.tc-row:last-of-type{border-bottom:none}
.tc-dist{font-size:10px;font-weight:700;color:#ea580c;min-width:28px;flex-shrink:0}
.tc-nom{font-size:11px;font-weight:600;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tc-cp{font-size:10px;color:var(--muted);flex-shrink:0}
.tc-more{font-size:10px;color:var(--muted);font-style:italic;padding-top:4px;text-align:center}
.tc-empty{font-size:11px;color:var(--muted);font-style:italic}


/* TERRASSIERS SECTION */
.pt{border-top:1px solid var(--border);padding:10px 14px 12px}
.pt-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.pt-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.pt-controls{display:flex;gap:5px}
.pt-sel{padding:3px 6px;border:1px solid var(--border);border-radius:5px;font-size:11px;font-family:inherit;background:var(--pill);color:var(--text);outline:none;cursor:pointer}
.pt-list{}
.pt-item{display:flex;align-items:baseline;gap:5px;padding:4px 0;border-bottom:1px solid #f0ede6;flex-wrap:wrap}
.pt-item:last-child{border-bottom:none}
.pt-prio{display:inline-flex;align-items:center;height:15px;padding:0 5px;border-radius:3px;font-size:9px;font-weight:700;color:white;flex-shrink:0;white-space:nowrap}
.pt-nom{font-size:12px;font-weight:600;color:var(--text);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pt-loc{font-size:10px;color:var(--muted);white-space:nowrap}
.pt-more{padding:7px 14px;font-size:11px;font-weight:600;color:#2563eb;cursor:pointer;text-align:center;border-top:1px solid #e8e4dc;margin-top:2px}.pt-more:hover{background:#eff6ff}.pt-empty{font-size:12px;color:var(--muted);font-style:italic;padding:4px 0}

/* TOOLTIP */
.rtt{background:rgba(26,25,22,.88)!important;color:white!important;padding:6px 10px!important;border-radius:7px!important;font-family:'DM Sans',sans-serif!important;font-size:12px!important;font-weight:500!important;border:none!important;box-shadow:0 3px 10px rgba(0,0,0,.2)!important;white-space:nowrap!important}
.rtt::before{display:none!important}

#map-badge{position:absolute;bottom:20px;right:20px;background:rgba(255,255,255,.95);border:1px solid var(--border);border-radius:8px;padding:7px 13px;font-size:12px;font-weight:600;z-index:999;box-shadow:var(--shadow);pointer-events:none}


/* ═══ MOBILE — terrain smartphone ═══════════════════════════════ */
@media(max-width:700px){
  #app{flex-direction:column-reverse} /* map on top, panel below */
  
  #map-container{
    height:60vh;flex:none;
    position:relative;
  }
  
  /* Floating search button on map */
  #mobile-panel-toggle{
    display:flex;
    position:absolute;bottom:60px;left:50%;transform:translateX(-50%);
    background:white;border:1px solid var(--border);border-radius:24px;
    padding:10px 20px;gap:8px;align-items:center;
    box-shadow:0 4px 16px rgba(0,0,0,.15);z-index:1000;
    font-size:13px;font-weight:600;color:var(--text);cursor:pointer;
    white-space:nowrap;
  }

  /* Bottom sheet panel */
  #sidebar{
    width:100%;min-width:unset;
    height:40vh;
    flex-direction:column;
    border-right:none;border-top:1px solid var(--border);
    box-shadow:0 -4px 20px rgba(0,0,0,.08);
    /* Drag handle */
    position:relative;
  }
  #sidebar::before{
    content:'';display:block;
    width:36px;height:4px;background:#d4d0c8;border-radius:2px;
    margin:8px auto 0;flex-shrink:0;
  }

  #sidebar-header{padding:8px 14px 10px}
  .logo{margin-bottom:10px}
  .logo-mark{width:28px;height:28px;font-size:11px}
  .stats-row{gap:5px}
  .stat-chip{padding:6px 8px}
  .stat-chip .n{font-size:15px}
  .stat-chip .l{font-size:9px}
  
  .search-area{padding:8px 14px;display:flex;gap:6px;flex-direction:row}
  .sw{margin-bottom:0;flex:1}
  .sb{padding:8px 10px 8px 28px;font-size:13px}
  .si{font-size:12px;left:8px}

  .filters-area{
    padding:0 14px 8px;
    display:none; /* hidden by default on mobile */
  }
  .filters-area.open{display:block}
  
  /* Filter toggle button */
  #mobile-filter-btn{
    display:inline-flex;align-items:center;gap:4px;
    padding:5px 10px;border-radius:6px;background:var(--pill);
    border:1px solid var(--border);font-size:12px;font-weight:500;
    color:var(--muted);cursor:pointer;margin:0 14px 6px;flex-shrink:0;
  }

  #pdv-list{padding:4px 8px}
  .pdv-item{padding:8px 10px}
  .pdv-name{font-size:13px}
  
  /* Map badge repositioned */
  #map-badge{bottom:70px;right:10px;padding:5px 10px;font-size:11px}
  
  /* Popup full-width on mobile */
  .rp .leaflet-popup-content-wrapper{
    border-radius:12px 12px 0 0 !important;
    margin:0 !important;
  }
  .rp .leaflet-popup-content{width:calc(100vw - 40px)!important;max-width:380px!important}
  
  /* Larger touch targets */
  .cb{padding:5px 10px;font-size:12px}
  .pt-sel{padding:5px 8px;font-size:12px}
}

/* Floating panel toggle — hidden on desktop */
#mobile-panel-toggle{display:none}
#mobile-filter-btn{display:none}
@media(max-width:700px){
  #mobile-panel-toggle{display:flex}
  #mobile-filter-btn{display:inline-flex}
}

</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div id="sidebar-header">
      <div class="logo">
        <div class="logo-mark">RM</div>
        <div><div class="logo-text">Carte Terrain</div><div class="logo-sub">Remacle · France</div></div>
      </div>
      <div class="stats-row" id="stats-row"></div>
    </div>
    <div class="search-area">
      <div class="sw"><span class="si">&#128269;</span><input class="sb" id="s-pdv" type="text" placeholder="Rechercher PDV, enseigne, groupement…"></div>

      </div>
      <div class="tr">
        <div class="tg on" id="t-lbl"></div>
        <span class="tl" onclick="document.getElementById('t-lbl').click()">Étiquettes sur les pins</span>

    </div>
    <div id="pdv-list"></div>
  </div>
  <div id="map-container">
    <div id="map"></div>
    <div id="map-badge">&#128205; <span id="badge-n">0</span> PDVs</div>
    <div id="mobile-panel-toggle" onclick="toggleMobilePanel()">&#9776; PDVs &amp; filtres</div>
  </div>
</div>

<script>
const RAW_DATA = window.RAW_DATA;
const TERRA_DATA = window.TERRA_DATA;


const GRP_COLORS = {"Chausson Mat\u00e9riaux": "#2563eb", "Chausson TP": "#1d4ed8", "Point.P": "#0891b2", "BigMat": "#dc2626", "France Mat\u00e9riaux": "#7c3aed", "Groupamat": "#0d9488", "BME France": "#be185d", "Samse": "#1a6b3c", "MatPlus / Matnor": "#7c2d12", "Starmat": "#d97706", "Gedimat": "#16a34a", "Terrassier TP": "#ea580c"};

function haversine(lat1,lon1,lat2,lon2){
  const R=6371, dLat=(lat2-lat1)*Math.PI/180, dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function getNearbyTerra(lat, lon, radiusKm) {
  const results = [];
  for (const t of TERRA_SMALL) {
    const d = haversine(lat, lon, t.lat, t.lon);
    if (d <= radiusKm) results.push({...t, dist: Math.round(d)});
  }
  results.sort((a,b) => a.dist - b.dist);
  return results;
}


function haversine(lat1,lon1,lat2,lon2){
  const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function getNearbyTerra(lat,lon,radiusKm,maxN){
  const results=[];
  for(const t of TERRA_DATA){
    if(!t.lat||!t.lon) continue;
    const d=haversine(lat,lon,t.lat,t.lon);
    if(d<=radiusKm) results.push({...t,dist:d});
  }
  results.sort((a,b)=>a.dist-b.dist);
  return results.slice(0,maxN);
}

function refreshTerra(id,lat,lon){
  const r=parseInt(document.getElementById('ptr-'+id).value);
  const n=parseInt(document.getElementById('ptn-'+id).value);
  const list=document.getElementById('ptl-'+id);
  if(!list) return;
  const results=getNearbyTerra(lat,lon,r,n);
  if(!results.length){
    list.innerHTML='<div class="pt-empty">Aucun terrassier dans ce rayon</div>';
    return;
  }
  const PRIO_COLOR={'20t+':'#dc2626','10t-20t':'#ea580c','5t-10t':'#6b7280'};
  list.innerHTML=results.map(t=>`
    <div class="pt-item" onclick="map.closePopup();if(${t.lat})map.setView([${t.lat},${t.lon}],14)" style="cursor:pointer" title="${t.n}">
      <span class="pt-prio" style="background:${PRIO_COLOR[t.t]||'#6b7280'}">${t.t||'?'}</span>
      <span class="pt-nom">${t.n}</span>
      <span class="pt-loc">${t.d} · ${t.dist.toFixed(1)} km</span>
    </div>`).join('');
}

function gc(grp){ return GRP_COLORS[grp] || '#6b7280'; }
function hex2rgba(h,a){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}

let filtered=[...RAW_DATA], activeId=null, markers={}, clusterGroup=null, showLabels=true, showTerra=true;

const map=L.map('map',{center:[49.5,3.0],zoom:7,preferCanvas:false});
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
  attribution:'&copy; OSM &copy; CARTO',subdomains:'abcd',maxZoom:19
}).addTo(map);

function makeIcon(pdv){
  // Diamond shape for terrassiers
  if(pdv.groupement === 'Terrassier TP'){
    const color = gc(pdv.groupement);
    const prio = pdv.priorite === '20t+' ? '⬛' : '▪';
    const lbl = showLabels ? `<div style="font-family:DM Sans,sans-serif;font-size:9px;font-weight:700;color:#1a1916;text-align:center;white-space:nowrap;text-shadow:0 0 3px white,0 0 3px white;margin-top:1px;max-width:80px;overflow:hidden;text-overflow:ellipsis">${pdv.nom.substring(0,15)}</div>` : '';
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24">
      <path d="M12 2 L22 12 L12 22 L2 12 Z" fill="${color}" stroke="white" stroke-width="1.5"/>
      <circle cx="12" cy="12" r="4" fill="white" fill-opacity="0.85"/>
    </svg>`;
    return L.divIcon({
      className:'',
      html:`<div style="display:flex;flex-direction:column;align-items:center;filter:drop-shadow(0 2px 3px rgba(0,0,0,.25))">${svg}${lbl}</div>`,
      iconSize:[22,showLabels?38:22],iconAnchor:[11,11],popupAnchor:[0,-14]
    });
  }
  // Standard pin
  const color=gc(pdv.groupement);
  const hasC=pdv.contacts&&pdv.contacts.length>0;
  const ring=hasC?`<circle cx="12" cy="12" r="9" fill="none" stroke="#1a6b3c" stroke-width="2.5"/>`:'';
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="22" height="28" viewBox="0 0 24 30">
    <path d="M12 0C5.373 0 0 5.373 0 12c0 8 12 18 12 18s12-10 12-18C24 5.373 18.627 0 12 0z" fill="${color}"/>
    <circle cx="12" cy="12" r="5" fill="white" fill-opacity="0.9"/>${ring}
  </svg>`;
  // Label: show enseigne if different from groupement, else groupement short
  const grpName=pdv.groupement;
  const ensName=pdv.enseigne;
  const labelText=(ensName&&ensName!=='—'&&ensName!==grpName)?ensName:grpName;
  const lbl=showLabels?`<div style="font-family:DM Sans,sans-serif;font-size:9px;font-weight:700;color:#1a1916;text-align:center;white-space:nowrap;text-shadow:0 0 3px white,0 0 3px white,0 0 3px white;margin-top:1px;max-width:90px;overflow:hidden;text-overflow:ellipsis;line-height:1.1">${labelText}</div>`:'';
  return L.divIcon({
    className:'',
    html:`<div style="display:flex;flex-direction:column;align-items:center;filter:drop-shadow(0 2px 3px rgba(0,0,0,.22))">${svg}${lbl}</div>`,
    iconSize:[22,showLabels?42:28],iconAnchor:[11,28],popupAnchor:[0,-30]
  });
}

function buildPopup(p){
  const color=gc(p.groupement);
  const showEns=p.enseigne&&p.enseigne!=='—'&&p.enseigne!==p.groupement;
  const ensBadge=showEns?`<span class="ph-ens" style="color:${color};border-color:${color}">${p.enseigne}</span>`:'';
  let cHtml='';
  if(p.contacts&&p.contacts.length>0){
    const cards=p.contacts.map(c=>{
      const name=[c.prenom,c.nom].filter(Boolean).join(' ');
      const role=c.role?`<div class="cc-role">${c.role}</div>`:'';
      let btns='';
      if(c.email) btns+=`<a href="mailto:${c.email}" class="cb em">✉ ${c.email}</a>`;
      if(c.mobile) btns+=`<a href="tel:${c.mobile.replace(/\s/g,'')}" class="cb tl">📞 ${c.mobile}</a>`;
      return `<div class="cc"><div class="cc-name">${name}</div>${role}${btns?`<div class="ca">${btns}</div>`:''}</div>`;
    }).join('');\n  window._terraData=window._terraData||{}; window._terraData[id]={results,lat,lon};\n  if(results.length>=n) list.innerHTML+=`<div class="pt-more" onclick="openTerraModal('${id}')">📋 Voir les ${results.length} résultats complets</div>`;
    cHtml=`<div class="pc"><div class="pc-title">Contacts (${p.contacts.length})</div>${cards}</div>`;
  } else {
    cHtml=`<div class="pnc">Aucun contact identifié</div>`;
  }
  // Terrassiers section (not shown for terrassiers themselves)
  let terraHtml = '';
  if (p.groupement !== 'Terrassier TP' && p.lat && p.lon) {
    const nearby = getNearbyTerra(p.lat, p.lon, 20);
    const count = nearby.length;
    const rows = nearby.slice(0, 8).map(t =>
      `<div class="tc-row"><span class="tc-dist">${t.dist}km</span><span class="tc-nom">${t.n}</span><span class="tc-cp">${t.c||t.cp}</span></div>`
    ).join('');
    const more = count > 8 ? `<div class="tc-more">+${count-8} autres dans ce rayon</div>` : '';
    const empty = count === 0 ? '<div class="tc-empty">Aucun dans un rayon de 20 km</div>' : '';
    const pid = p.id.replace(/[^a-z0-9]/gi,'_');
    terraHtml = `<div class="pt">
      <div class="pt-header">
        <span class="pt-title">🏗 Terrassiers à proximité</span>
        <span class="pt-badge">${count}</span>
        <select class="pt-radius" onchange="updateTerra('${pid}',this.value,${p.lat},${p.lon})" id="ptr_${pid}">
          <option value="10">10 km</option>
          <option value="20" selected>20 km</option>
          <option value="30">30 km</option>
          <option value="50">50 km</option>
        </select>
      </div>
      <div id="ptl_${pid}">${rows}${more}${empty}</div>
    </div>`;
  }

  return `<div>
    <div class="ph">
      <div class="ph-badges">
        <span class="ph-grp" style="background:${color}">${p.groupement}</span>
        ${ensBadge}
      </div>
      <div class="ph-name">${p.nom}</div>
      <div class="ph-loc">📍 ${p.cp||''} ${p.ville||''} ${p.dept?'('+p.dept+')':''}</div>
    </div>
    ${cHtml}
    ${terraHtml}
  </div>`;
}

function buildTooltip(p){
  const color=gc(p.groupement);
  const showEns=p.enseigne&&p.enseigne!=='—'&&p.enseigne!==p.groupement;
  const ens=showEns?` <span style="opacity:.75">/ ${p.enseigne}</span>`:'';
  const ct=p.contacts&&p.contacts.length>0?` <span style="color:#86efac">· 👤${p.contacts.length}</span>`:'';
  return `<span style="color:${color};font-weight:700">${p.groupement}</span>${ens} — ${p.nom}${ct}`;
}

function renderMarkers(){
  if(clusterGroup) map.removeLayer(clusterGroup);

        className:'',iconSize:[sz,sz]
      });

  filtered.forEach(p=>{
    if(!p.lat||!p.lon) return;
    const m=L.marker([p.lat,p.lon],{icon:makeIcon(p)});
    m.bindPopup(buildPopup(p),{className:'rp',maxWidth:360,minWidth:320});
    m.bindTooltip(buildTooltip(p),{className:'rtt',sticky:true,offset:[12,0],direction:'right',opacity:1});
    m.on('click',()=>setActive(p.id));
    markers[p.id]=m;
    clusterGroup.addLayer(m);
  });
  map.addLayer(clusterGroup);
  document.getElementById('badge-n').textContent=filtered.filter(p=>p.lat&&p.lon).length;
}

function renderList(){
  const el=document.getElementById('pdv-list');
  if(!filtered.length){el.innerHTML='<div class="list-empty">Aucun PDV trouvé</div>';return;}
  el.innerHTML=filtered.map(p=>{
    const color=gc(p.groupement);
    const showEns=p.enseigne&&p.enseigne!=='—'&&p.enseigne!==p.groupement;
    const ensBadge=showEns?`<span class="badge-ens" style="color:${color};border-color:${hex2rgba(color,.4)}">${p.enseigne}</span>`:'';
    const hasC=p.contacts&&p.contacts.length>0;
    return `<div class="pdv-item${activeId===p.id?' active':''}" data-id="${p.id}" onclick="selectPdv('${p.id}')">
      <div class="pdv-name">${p.nom}</div>
      <div class="pdv-tags">
        <span class="badge-grp" style="background:${color}">${p.groupement}</span>
        ${ensBadge}
        <span class="pdv-loc">${p.cp||''} ${p.ville||''}</span>
        ${hasC?`<span class="badge-ct">👤${p.contacts.length}</span>`:''}
      </div>
    </div>`;
  }).join('');\n  window._terraData=window._terraData||{}; window._terraData[id]={results,lat,lon};\n  if(results.length>=n) list.innerHTML+=`<div class="pt-more" onclick="openTerraModal('${id}')">📋 Voir les ${results.length} résultats complets</div>`;
}

function renderStats(){
  const negoces=filtered.filter(p=>p.groupement!=='Terrassier TP').length;
  const terra=filtered.filter(p=>p.groupement==='Terrassier TP').length;
  const ct=filtered.reduce((a,p)=>a+(p.contacts?p.contacts.length:0),0);
  const parts=[];
  if(negoces>0) parts.push(`<div class="stat-chip"><div class="n">${negoces}</div><div class="l">Négoces</div></div>`);
  if(terra>0) parts.push(`<div class="stat-chip" style="border:1px solid #fdba74"><div class="n" style="color:#ea580c">${terra}</div><div class="l">Terrassiers</div></div>`);
  parts.push(`<div class="stat-chip"><div class="n">${ct}</div><div class="l">Contacts</div></div>`);
  document.getElementById('stats-row').innerHTML=parts.join('');
}

function applyFilters(){
  const pq=document.getElementById('s-pdv').value.toLowerCase().trim();
  const cq=document.getElementById('s-ct').value.toLowerCase().trim();
  const grp=document.getElementById('f-grp').value;
  const ens=document.getElementById('f-ens').value;
  const dept=document.getElementById('f-dept').value;
  const cOnly=document.getElementById('t-ct').classList.contains('on');
  filtered=RAW_DATA.filter(p=>{
    if(grp&&p.groupement!==grp) return false;
    if(ens&&p.enseigne!==ens) return false;
    if(dept&&p.dept!==dept) return false;
    if(cOnly&&(!p.contacts||!p.contacts.length)) return false;
    if(!showTerra&&p.groupement==='Terrassier TP') return false;
    if(pq&&![p.nom,p.enseigne,p.groupement,p.ville,p.cp].join(' ').toLowerCase().includes(pq)) return false;
    if(cq&&!(p.contacts&&p.contacts.some(c=>[c.prenom,c.nom,c.email,c.mobile,c.role].filter(Boolean).join(' ').toLowerCase().includes(cq)))) return false;
    return true;
  });
  // When groupement filter active, update enseigne dropdown
  if(grp){
    const ens_sel=document.getElementById('f-ens');
    const cur=ens_sel.value;
    const opts=[...new Set(RAW_DATA.filter(p=>p.groupement===grp).map(p=>p.enseigne).filter(e=>e&&e!=='—'&&e!==grp))].sort();
    ens_sel.innerHTML='<option value="">Toutes les enseignes</option>';
    opts.forEach(e=>ens_sel.innerHTML+=`<option value="${e}"${e===cur?' selected':''}>${e}</option>`);
  }
  renderStats();renderList();renderMarkers();
}

function selectPdv(id){
  activeId=id;
  const p=RAW_DATA.find(x=>x.id===id);
  if(!p||!p.lat||!p.lon) return;
  document.querySelectorAll('.pdv-item').forEach(el=>el.classList.toggle('active',el.dataset.id===id));
  const el=document.querySelector(`.pdv-item[data-id="${id}"]`);
  if(el) el.scrollIntoView({block:'nearest',behavior:'smooth'});
  map.setView([p.lat,p.lon],14,{animate:true});
  setTimeout(()=>{if(markers[id]) clusterGroup.zoomToShowLayer(markers[id],()=>markers[id].openPopup());},400);
}

function updateTerra(pid, radiusKm, lat, lon) {
  const nearby = getNearbyTerra(lat, lon, parseInt(radiusKm));
  const count = nearby.length;
  const rows = nearby.slice(0,8).map(t =>
    `<div class="tc-row"><span class="tc-dist">${t.dist}km</span><span class="tc-nom">${t.n}</span><span class="tc-cp">${t.c||t.cp}</span></div>`
  ).join('');
  const more = count > 8 ? `<div class="tc-more">+${count-8} autres dans ce rayon</div>` : '';
  const empty = count === 0 ? '<div class="tc-empty">Aucun dans ce rayon</div>' : '';
  const el = document.getElementById('ptl_'+pid);
  if (el) el.innerHTML = rows + more + empty;
  // Update badge
  const badge = document.querySelector(`#ptr_${pid}`)?.closest('.pt')?.querySelector('.pt-badge');
  if (badge) badge.textContent = count;
}

function setActive(id){
  activeId=id;
  document.querySelectorAll('.pdv-item').forEach(el=>el.classList.toggle('active',el.dataset.id===id));
  const el=document.querySelector(`.pdv-item[data-id="${id}"]`);
  if(el) el.scrollIntoView({block:'nearest',behavior:'smooth'});
}


// Auto-init on popup open
map.on('popupopen',function(e){const c=e.popup.getContent();if(typeof c==='string'){const m=c.match(/id="pt-([^"]+)"/);if(m){const id=m[1];const p=RAW_DATA.find(x=>x.id===id);if(p&&p.lat&&p.lon)setTimeout(()=>refreshTerra(id,p.lat,p.lon),50);}}
});
// Mobile panel toggle
let mobilePanelOpen = true;
function toggleMobilePanel(){
  const sidebar = document.getElementById('sidebar');
  mobilePanelOpen = !mobilePanelOpen;
  sidebar.style.height = mobilePanelOpen ? '40vh' : '0px';
  sidebar.style.overflow = mobilePanelOpen ? '' : 'hidden';
}
function toggleFilters(){
  const fa = document.getElementById('filters-area');
  if(fa) fa.classList.toggle('open');
}
// Swipe to resize panel on mobile
(function(){
  const sidebar = document.getElementById('sidebar');
  let startY = 0, startH = 0;
  sidebar.addEventListener('touchstart', e=>{
    if(window.innerWidth > 700) return;
    startY = e.touches[0].clientY;
    startH = sidebar.offsetHeight;
  },{passive:true});
  sidebar.addEventListener('touchmove', e=>{
    if(window.innerWidth > 700) return;
    const dy = startY - e.touches[0].clientY;
    const newH = Math.min(Math.max(startH + dy, 80), window.innerHeight * 0.8);
    sidebar.style.height = newH + 'px';
  },{passive:true});
})();

// INIT
(function(){
  // Groupements
  const gs=document.getElementById('f-grp');
  const grps=[...new Set(RAW_DATA.map(p=>p.groupement))].sort();
  grps.forEach(g=>{const n=RAW_DATA.filter(p=>p.groupement===g).length;gs.innerHTML+=`<option value="${g}">${g} (${n})</option>`;});

  // Enseignes (toutes au départ)
  const es=document.getElementById('f-ens');
  const enss=[...new Set(RAW_DATA.map(p=>p.enseigne).filter(e=>e&&e!=='—'))].sort();
  enss.forEach(e=>{const n=RAW_DATA.filter(p=>p.enseigne===e).length;es.innerHTML+=`<option value="${e}">${e} (${n})</option>`;});

  // Depts
  const ds=document.getElementById('f-dept');
  [...new Set(RAW_DATA.map(p=>p.dept).filter(Boolean))].sort().forEach(d=>ds.innerHTML+=`<option value="${d}">${d}</option>`);

  // Groupement cascade → reset enseigne list
  document.getElementById('f-grp').addEventListener('change',function(){
    const g=this.value;
    const es2=document.getElementById('f-ens');
    es2.innerHTML='<option value="">Toutes les enseignes</option>';
    if(g){
      const opts=[...new Set(RAW_DATA.filter(p=>p.groupement===g).map(p=>p.enseigne).filter(e=>e&&e!=='—'&&e!==g))].sort();
      opts.forEach(e=>{const n=RAW_DATA.filter(p=>p.groupement===g&&p.enseigne===e).length;es2.innerHTML+=`<option value="${e}">${e} (${n})</option>`;});
    } else {
      enss.forEach(e=>{const n=RAW_DATA.filter(p=>p.enseigne===e).length;es2.innerHTML+=`<option value="${e}">${e} (${n})</option>`;});
    }
    applyFilters();
  });

  ['s-pdv','s-ct','f-ens','f-dept'].forEach(id=>document.getElementById(id).addEventListener('input',applyFilters));
  ['f-ens','f-dept'].forEach(id=>document.getElementById(id).addEventListener('change',applyFilters));
  document.getElementById('t-ct').addEventListener('click',function(){this.classList.toggle('on');applyFilters();});
  document.getElementById('t-terra').addEventListener('click',function(){this.classList.toggle('on');showTerra=this.classList.contains('on');applyFilters();});
  document.getElementById('t-lbl').addEventListener('click',function(){this.classList.toggle('on');showLabels=this.classList.contains('on');applyFilters();});

  applyFilters();
})();
</script>
